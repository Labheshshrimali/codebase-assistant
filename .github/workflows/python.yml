name: CI Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      - name: Run Tests
        env:
          QDRANT_URL: dummy
          QDRANT_API_KEY: dummy
        run: |
          pytest
