<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0d1117]">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codebase Assistant</title>
  
  <!-- Fonts & Styling -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          colors: {
            github: {
              bg: '#0d1117',
              panel: '#161b22',
              border: '#30363d',
              text: '#c9d1d9',
              muted: '#8b949e',
              accent: '#58a6ff',
              amber: '#e3b341',
              green: '#3fb950',
            }
          }
        }
      }
    }
  </script>
  
  <style>
    /* Custom scrollbar for GitHub feel */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
    
    .cite-panel-transition {
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Fix for textarea resizing */
    textarea { resize: none; }

    /* Toast animations */
    .toast {
      transition: all 0.3s ease;
      transform: translateY(100px);
      opacity: 0;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body class="h-full text-github-text font-sans overflow-hidden">

<div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

<div class="flex flex-col h-full max-w-[1440px] mx-auto relative">
  <!-- Header -->
  <header class="flex items-center gap-3 px-4 py-3 border-b border-github-border bg-github-panel shrink-0">
    <div class="w-8 h-8 rounded-md bg-gradient-to-br from-github-amber to-yellow-700 flex items-center justify-center font-mono font-bold text-sm text-black shrink-0">
      &gt;_
    </div>
    <div class="hidden sm:block">
      <h1 class="text-sm font-semibold leading-tight">Codebase Assistant</h1>
      <div class="font-mono text-[11px] text-github-muted">hybrid retrieval &middot; vector + graph + BM25</div>
    </div>
    
    <div class="ml-auto flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-github-muted transition-colors duration-200" id="statusDot"></span>
      <div class="flex items-center gap-2">
        <input class="font-mono text-xs bg-github-bg border border-github-border text-github-text rounded-md px-3 py-1.5 w-40 sm:w-72 outline-none focus:border-github-accent transition-colors" 
               id="repoUrl" placeholder="https://github.com/psf/requests" value="https://github.com/psf/requests" />
        <button class="font-sans text-xs font-medium bg-transparent text-github-muted border border-github-border rounded-md px-3 py-1.5 cursor-pointer hover:border-github-accent hover:text-github-accent transition-all disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap" 
                id="ingestBtn">Index repo</button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main id="mainGrid" class="flex flex-1 min-h-0 overflow-hidden">
    <!-- Chat Column -->
    <div class="flex-1 flex flex-col min-w-0 overflow-y-auto p-4 sm:p-6" id="chatCol">
      <div class="m-auto text-center max-w-md text-github-muted" id="emptyState">
        <div class="font-mono text-4xl text-github-amber/50 mb-3">{ }</div>
        <h2 class="text-base font-semibold text-github-text mb-2">Ask a question about the code</h2>
        <p class="text-sm leading-relaxed">
          Index a repo above, then ask things like <code class="font-mono bg-github-panel px-1 rounded text-github-amber text-xs">"how does the library handle retries?"</code>. 
          Answers cite exact files &mdash; click any citation to view source.
        </p>
      </div>
    </div>

    <!-- Citation Side Panel -->
    <div id="citePanel" class="cite-panel-transition w-0 border-l border-github-border bg-github-panel overflow-y-auto shrink-0">
      <div class="p-4 sm:p-5 hidden" id="citePanelInner">
        <!-- Tabs -->
        <div class="flex gap-1.5 mb-4 flex-wrap" id="citeTabs"></div>
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-3">
          <div class="min-w-0">
            <div class="font-mono text-sm text-github-text font-medium truncate" id="citePath">&mdash;</div>
            <div class="font-mono text-[11px] text-github-muted" id="citeLines">&mdash;</div>
          </div>
          <div class="flex gap-2">
            <button id="copyCodeBtn" class="p-1 text-github-muted hover:text-github-accent hover:bg-github-border rounded transition-colors" title="Copy Code">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            </button>
            <button class="p-1 text-github-muted hover:text-github-text hover:bg-github-border rounded transition-colors" id="closePanel">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
          </div>
        </div>
        
        <!-- Code Block -->
        <pre class="m-0 bg-github-bg !bg-github-bg border border-github-border rounded-lg p-3 text-[12.5px] leading-relaxed overflow-x-auto"><code id="citeCode" class="language-python"></code></pre>
      </div>
    </div>
  </main>

  <!-- Input Area -->
  <div class="border-t border-github-border bg-github-panel p-4 sm:px-6 sm:py-4 shrink-0">
    <div class="max-w-3xl mx-auto">
      <div class="flex gap-2 bg-github-bg border border-github-border rounded-xl p-1.5 pl-3 focus-within:border-github-accent transition-colors">
        <textarea id="questionInput" rows="1" 
                  class="flex-1 bg-transparent border-none outline-none text-github-text font-sans text-sm py-2 max-h-32" 
                  placeholder="Ask about the indexed repo..."></textarea>
        <button class="bg-github-amber border-none rounded-lg w-9 h-9 shrink-0 flex items-center justify-center transition-transform hover:scale-105 disabled:bg-github-border disabled:cursor-not-allowed" 
                id="sendBtn" title="Send">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#1a1206" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="font-mono text-[10px] text-github-muted mt-2 text-center sm:text-left" id="hint">
        Not indexed yet &middot; click "Index repo" first
      </div>
    </div>
  </div>
</div>

<script>
// ---- Configuration ----
const API_BASE = window.API_BASE || "";

const chatCol = document.getElementById('chatCol');
const emptyState = document.getElementById('emptyState');
const questionInput = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
const ingestBtn = document.getElementById('ingestBtn');
const repoUrlInput = document.getElementById('repoUrl');
const statusDot = document.getElementById('statusDot');
const hint = document.getElementById('hint');
const citePanel = document.getElementById('citePanel');
const citePanelInner = document.getElementById('citePanelInner');
const citeTabs = document.getElementById('citeTabs');
const citePath = document.getElementById('citePath');
const citeLines = document.getElementById('citeLines');
const citeCode = document.getElementById('citeCode');
const closePanel = document.getElementById('closePanel');

// Toast System
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const colors = {
    info: 'bg-github-panel border-github-border text-github-text',
    success: 'bg-github-green/20 border-github-green text-github-green',
    error: 'bg-red-900/20 border-red-500 text-red-400'
  };
  toast.className = `toast show px-4 py-2 rounded-lg border text-xs font-medium shadow-lg ${colors[type]}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

let repoSlug = null;
// ... (rest of the functions: slugify, autoresize)
let citationStore = {};

function slugify(url) {
  try {
    const parts = url.replace(/\/$/, '').split('/');
    return `${parts[parts.length - 2]}__${parts[parts.length - 1]}`;
  } catch { return null; }
}

function autoresize() {
  questionInput.style.height = 'auto';
  questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + 'px';
}
questionInput.addEventListener('input', autoresize);
questionInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
});

ingestBtn.addEventListener('click', async () => {
  const url = repoUrlInput.value.trim();
  if (!url) return;
  statusDot.className = 'w-1.5 h-1.5 rounded-full bg-github-amber animate-pulse';
  ingestBtn.disabled = true;
  ingestBtn.textContent = 'Indexing…';
  hint.textContent = 'Cloning, chunking, and embedding the repo — first run can take a minute.';
  try {
    const res = await fetch(`${API_BASE}/ingest`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo_url: url })
    });
    const data = await res.json();
    repoSlug = data.repo || slugify(url);
    statusDot.className = 'w-1.5 h-1.5 rounded-full bg-github-green shadow-[0_0_6px_#3fb950]';
    hint.textContent = `Indexed ${repoSlug} — ${data.chunks_indexed ?? '?'} chunks${data.cached ? ' (loaded from cache)' : ''}. Ask away.`;
  } catch (err) {
    statusDot.className = 'w-1.5 h-1.5 rounded-full bg-github-muted';
    hint.textContent = 'Could not reach the API — check API_BASE and that the server is running.';
  } finally {
    ingestBtn.disabled = false;
    ingestBtn.textContent = 'Index repo';
  }
});

function addUserTurn(text) {
  if (emptyState) emptyState.remove();
  const div = document.createElement('div');
  div.className = 'flex flex-col items-end mb-6 max-w-3xl ml-auto w-full';
  div.innerHTML = `
    <div class="flex gap-2 items-center text-github-muted text-xs font-medium mb-1">
      <span class="text-github-accent font-mono">›</span>
      <span>You</span>
    </div>
    <div class="bg-github-panel border border-github-border text-github-text px-4 py-2 rounded-2xl rounded-tr-none text-sm shadow-sm">
      ${escapeHtml(text)}
    </div>
  `;
  chatCol.appendChild(div);
  chatCol.scrollTop = chatCol.scrollHeight;
  return div;
}

function addLoadingTurn() {
  const div = document.createElement('div');
  div.className = 'flex gap-3 items-center text-github-muted font-mono text-xs py-2 mb-6';
  div.innerHTML = `
    <div class="flex gap-1">
      <span class="w-1 h-1 bg-github-muted rounded-full animate-bounce"></span>
      <span class="w-1 h-1 bg-github-muted rounded-full animate-bounce [animation-delay:0.2s]"></span>
      <span class="w-1 h-1 bg-github-muted rounded-full animate-bounce [animation-delay:0.4s]"></span>
    </div>
    <span>retrieving & generating...</span>
  `;
  chatCol.appendChild(div);
  chatCol.scrollTop = chatCol.scrollHeight;
  return div;
}

function normalizeCitation(c) {
  if (typeof c === 'string') {
    const match = c.match(/^(.*?)#L(\d+)-L(\d+)$/);
    if (match) {
      return { file: match[1], start_line: parseInt(match[2], 10), end_line: parseInt(match[3], 10), code: null };
    }
    return { file: c, start_line: '?', end_line: '?', code: null };
  }
  return {
    file: c.file || c.path || c.filename || 'unknown',
    start_line: c.start_line ?? c.start ?? '?',
    end_line: c.end_line ?? c.end ?? '?',
    code: c.code || null,
  };
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderAnswer(data) {
  const turn = document.createElement('div');
  turn.className = 'flex flex-col items-start mb-6 max-w-3xl w-full';
  
  let html = '';
  if (data.generation_available === false) {
    html += `
      <div class="flex gap-2 items-center text-github-muted text-xs font-medium mb-1">
        <span class="text-github-amber font-mono">⚠</span>
        <span>Assistant (Retrieval only)</span>
      </div>
      <div class="bg-github-panel border border-github-amber/30 text-github-text px-4 py-2 rounded-2xl rounded-tl-none text-sm shadow-sm mb-3">
        <div class="text-github-amber font-mono text-[11px] mb-2 pb-2 border-b border-github-border">
          generation backend unavailable — showing sources
        </div>
        ${escapeHtml(data.answer || 'No answer returned.')}
      </div>
    `;
  } else {
    html += `
      <div class="flex gap-2 items-center text-github-muted text-xs font-medium mb-1">
        <span class="text-github-green font-mono">✓</span>
        <span>Assistant</span>
      </div>
      <div class="bg-github-panel border border-github-border text-github-text px-4 py-2 rounded-2xl rounded-tl-none text-sm shadow-sm">
        ${escapeHtml(data.answer || 'No answer returned.')}
      </div>
    `;
  }

  const rawCitations = data.citations || [];
  const citations = rawCitations.map(normalizeCitation);
  if (citations.length) {
    html += '<div class="flex flex-wrap gap-1.5 mt-3">';
    citations.forEach((c, i) => {
      const id = `${Date.now()}_${i}`;
      citationStore[id] = { ...c, idx: i };
      html += `
        <button class="cite-chip font-mono text-[10px] bg-github-border text-github-muted border border-transparent hover:border-github-accent hover:text-github-accent px-2 py-0.5 rounded transition-all" 
                data-cite="${id}">
          ⌘ ${c.file.split('/').pop()}:${c.start_line}
        </button>
      `;
    });
    html += '</div>';
  }

  turn.innerHTML = html;
  chatCol.appendChild(turn);
  chatCol.scrollTop = chatCol.scrollHeight;

  turn.querySelectorAll('.cite-chip').forEach(btn => {
    btn.addEventListener('click', () => openCitation(btn.dataset.cite, citations));
  });

  if (citations.length) {
    const firstId = Object.keys(citationStore).find(k => citationStore[k].idx === 0);
    openCitation(firstId, citations);
  }
}

async function openCitation(id, allCitations) {
  const cite = citationStore[id];
  if (!cite) return;

  citePanel.classList.remove('w-0');
  citePanel.classList.add('w-full', 'sm:w-[480px]');
  citePanelInner.classList.remove('hidden');

  citePath.textContent = cite.file;
  citeLines.textContent = `lines ${cite.start_line}–${cite.end_line}`;

  citeTabs.innerHTML = '';
  allCitations.forEach((c, i) => {
    const tab = document.createElement('button');
    tab.className = `font-mono text-[10px] px-2 py-1 rounded transition-all ${
      c.file === cite.file && c.start_line === cite.start_line 
        ? 'bg-github-accent text-white border-github-accent' 
        : 'bg-github-bg text-github-muted border-github-border border hover:text-github-text'
    }`;
    tab.textContent = `[${i + 1}] ${c.file.split('/').pop()}`;
    tab.addEventListener('click', () => {
      const matchId = Object.keys(citationStore).find(k =>
        citationStore[k].file === c.file && citationStore[k].start_line === c.start_line
      );
      if (matchId) openCitation(matchId, allCitations);
    });
    citeTabs.appendChild(tab);
  });

  citeCode.textContent = cite.code || `# source not embedded in response for ${cite.file}:${cite.start_line}-${cite.end_line}
# (backend can be extended to return snippet text alongside citations)`;
  citeCode.className = 'language-python';
  hljs.highlightElement(citeCode);
}

document.getElementById('copyCodeBtn').addEventListener('click', async () => {
  const code = citeCode.textContent;
  try {
    await navigator.clipboard.writeText(code);
    showToast('Code copied to clipboard!', 'success');
  } catch (err) {
    showToast('Failed to copy code', 'error');
  }
});

closePanel.addEventListener('click', () => {
  citePanel.classList.add('w-0');
  citePanel.classList.remove('w-full', 'sm:w-[480px]');
  citePanelInner.classList.add('hidden');
});

async function sendQuestion() {
  const text = questionInput.value.trim();
  if (!text) return;
  if (!repoSlug) {
    showToast('Please index a repository first', 'error');
    hint.textContent = 'Index a repo first, then ask your question.';
    return;
  }

  addUserTurn(text);
  questionInput.value = '';
  autoresize();
  sendBtn.disabled = true;
  const loadingEl = addLoadingTurn();

  try {
    const res = await fetch(`${API_BASE}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo: repoSlug, question: text })
    });
    const data = await res.json();
    loadingEl.remove();
    if (data.error) {
      showToast('Assistant error', 'error');
      const err = document.createElement('div');
      err.className = 'flex flex-col items-start mb-6 max-w-3xl w-full';
      err.innerHTML = `
        <div class="flex gap-2 items-center text-github-muted text-xs font-medium mb-1">
          <span class="text-github-amber font-mono">⚠</span>
          <span>Error</span>
        </div>
        <div class="bg-github-panel border border-github-amber/30 text-github-text px-4 py-2 rounded-2xl rounded-tl-none text-sm shadow-sm">
          ${escapeHaml(data.error)}
        </div>
      `;
      chatCol.appendChild(err);
    } else {
      renderAnswer(data);
    }
  } catch (err) {
    loadingEl.remove();
    showToast('Network error occurred', 'error');
    const errEl = document.createElement('div');
    errEl.className = 'flex flex-col items-start mb-6 max-w-3xl w-full';
    errEl.innerHTML = `
      <div class="flex gap-2 items-center text-github-muted text-xs font-medium mb-1">
        <span class="text-github-amber font-mono">⚠</span>
        <span>Error</span>
      </div>
      <div class="bg-github-panel border border-github-amber/30 text-github-text px-4 py-2 rounded-2xl rounded-tl-none text-sm shadow-sm">
        ERROR: ${escapeHtml(String(err && err.message || err))}
      </div>
    `;
    chatCol.appendChild(errEl);
  } finally {
    sendBtn.disabled = false;
    chatCol.scrollTop = chatCol.scrollHeight;
  }
}
sendBtn.addEventListener('click', sendQuestion);
</script>
</body>
</html>
